<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Emission</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f4f4f4;
        }

        form {
            background: white;
            padding: 20px;
            width: 400px;
            border-radius: 8px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            background-color: #2e7d32;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<h1>Add CO2 Emission Data</h1>

<form action="/add" method="post">

    <label>Country:</label>
    <input type="text" name="country">

    <label>CO2 Emission 2022:</label>
    <input type="number" step="0.1" name="co2Emission2022">

    <label>CO2 Emission 2023:</label>
    <input type="number" step="0.1" name="co2Emission2023">

    <button type="submit">Save</button>

</form>

</body>
</html>
