<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - CO₂ Tracker</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.2/dist/css/bootstrap.min.css">
</head>

<body class="container mt-5">

<h1>Scientist Login</h1>

<form method="post" action="/login">

    <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text"
               class="form-control"
               name="username">
    </div>

    <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password"
               class="form-control"
               name="password">
    </div>

    <button type="submit"
            class="btn btn-primary">
        Login
    </button>

</form>

</body>
</html>
