<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - CO₂ Tracker</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.2/dist/css/bootstrap.min.css">
</head>

<body class="container mt-4">

<h1>Admin Panel</h1>

<h3>Neue Emissionsdaten hinzufügen</h3>

<form action="/api/emissions" method="post">

    <div class="mb-3">
        <label class="form-label">Country</label>
        <input type="text" class="form-control" name="country">
    </div>

    <div class="mb-3">
        <label class="form-label">CO₂ 2022</label>
        <input type="number" step="0.1" class="form-control" name="co2Emission2022">
    </div>

    <div class="mb-3">
        <label class="form-label">CO₂ 2023</label>
        <input type="number" step="0.1" class="form-control" name="co2Emission2023">
    </div>

    <button type="submit" class="btn btn-success">
        Speichern
    </button>

</form>

</body>
</html>
