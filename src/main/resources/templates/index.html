<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="CO₂ emission tracking dashboard">
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Like Hero To Zero - CO₂ Tracker</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2/dist/css/bootstrap.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Tabulator -->
  <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator.min.css" rel="stylesheet">
  <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
</head>

<body>

<header class="container-fluid py-3">
  <div class="d-flex align-items-center gap-3">
    <img src="GreenWatch Logo1.png" alt="Logo" style="height:50px;">
    <h1 class="h4 m-0">CO₂ Emission Tracker</h1>
  </div>
</header>

<main class="container mt-4">

  <p>
    This dashboard visualizes yearly CO₂ emissions of countries.
  </p>

  <div class="table-wrapper mt-3">
    <div id="co2-table"></div>
  </div>

</main>

<!-- Scripts -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  new Tabulator("#co2-table", {
    ajaxURL: "http://localhost:8080/api/emissions",
    layout: "fitColumns",
    placeholder: "Keine Daten verfügbar",

    columns: [
      { title: "Country", field: "country", sorter: "string", headerFilter: "input" },
      { title: "2022", field: "co2Emission2022", sorter: "number" },
      { title: "2023", field: "co2Emission2023", sorter: "number" }
    ],

    initialSort: [
      { column: "country", dir: "asc" }
    ]
  });

});
</script>

</body>
</html>
